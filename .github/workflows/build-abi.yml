name: ABI Release

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: abi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-latest
            platform: macos-host
          - os: windows-latest
            platform: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build ABI (release)
        run: cargo build -p motor_abi --release

      - name: Prepare package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGE="dist/motorbridge-abi-${VERSION}-linux-x86_64"
          mkdir -p "${STAGE}"
          cp -v motor_abi/include/motor_abi.h "${STAGE}/"
          cp -v target/release/libmotor_abi.so "${STAGE}/"
          cp -v target/release/libmotor_abi.a "${STAGE}/"
          tar -czf "dist/motorbridge-abi-${VERSION}-linux-x86_64.tar.gz" -C dist "$(basename "${STAGE}")"

      - name: Prepare package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGE="dist/motorbridge-abi-${VERSION}-macos-host"
          mkdir -p "${STAGE}"
          cp -v motor_abi/include/motor_abi.h "${STAGE}/"
          cp -v target/release/libmotor_abi.dylib "${STAGE}/"
          cp -v target/release/libmotor_abi.a "${STAGE}/"
          tar -czf "dist/motorbridge-abi-${VERSION}-macos-host.tar.gz" -C dist "$(basename "${STAGE}")"

      - name: Prepare package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $stage = "dist/motorbridge-abi-$version-windows-x86_64"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item motor_abi/include/motor_abi.h "$stage/" -Force
          Copy-Item target/release/motor_abi.dll "$stage/" -Force
          if (Test-Path target/release/motor_abi.lib) {
            Copy-Item target/release/motor_abi.lib "$stage/" -Force
          }
          Compress-Archive -Path "$stage/*" -DestinationPath "dist/motorbridge-abi-$version-windows-x86_64.zip" -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: abi-package-${{ matrix.platform }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: publish-release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          find release-assets -type f \( -name "*.tar.gz" -o -name "*.zip" \) -print0 | sort -z | xargs -0 sha256sum > release-assets/SHA256SUMS.txt
          cat release-assets/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.zip
            release-assets/SHA256SUMS.txt
