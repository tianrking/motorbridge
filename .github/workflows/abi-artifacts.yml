name: ABI Artifacts

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"

jobs:
  build-abi:
    name: Build ABI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build ABI
        run: cargo build -p motor_abi --release

      - name: Collect ABI files (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp -v target/release/libmotor_abi.* dist/ || true
          ls -la dist

      - name: Collect ABI files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Get-ChildItem target/release/motor_abi.* -ErrorAction SilentlyContinue | Copy-Item -Destination dist -Force
          Get-ChildItem target/release/motor_abi.lib -ErrorAction SilentlyContinue | Copy-Item -Destination dist -Force
          Get-ChildItem dist

      - name: Upload ABI artifact
        uses: actions/upload-artifact@v4
        with:
          name: motor-abi-${{ runner.os }}
          path: dist/*
          if-no-files-found: error
