name: Update Homebrew Formula

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to process (for example v0.1.4)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download macOS arm64 release archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          mkdir -p dist
          gh release download "${TAG}" --pattern "motor-cli-${TAG}-macos-arm64.tar.gz" --dir dist
          ls -lah dist

      - name: Update Formula/motor-cli.rb
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VER="${TAG#v}"
          FILE="dist/motor-cli-${TAG}-macos-arm64.tar.gz"
          SHA=$(sha256sum "${FILE}" | awk '{print $1}')
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/motor-cli-${TAG}-macos-arm64.tar.gz"

          sed -i "s|^  version \".*\"$|  version \"${VER}\"|" Formula/motor-cli.rb
          sed -i "s|^  url \".*\"$|  url \"${URL}\"|" Formula/motor-cli.rb
          sed -i "s|^  sha256 \".*\"$|  sha256 \"${SHA}\"|" Formula/motor-cli.rb

      - name: Commit and push formula update
        run: |
          if git diff --quiet -- Formula/motor-cli.rb; then
            echo "No formula change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/motor-cli.rb
          git commit -m "chore(homebrew): update motor-cli formula for ${{ steps.meta.outputs.tag }}"
          git push
