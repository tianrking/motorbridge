name: Build ABI Artifacts

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-abi:
    name: build-abi-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build ABI (release)
        run: cargo build -p motor_abi --release

      - name: Prepare artifact directory (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp motor_abi/include/motor_abi.h dist/
          cp target/release/libmotor_abi.a dist/
          if [ "${{ runner.os }}" = "Linux" ]; then
            cp target/release/libmotor_abi.so dist/
          else
            cp target/release/libmotor_abi.dylib dist/
          fi

      - name: Prepare artifact directory (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item motor_abi/include/motor_abi.h dist/
          Copy-Item target/release/motor_abi.dll dist/
          if (Test-Path target/release/motor_abi.lib) {
            Copy-Item target/release/motor_abi.lib dist/
          }

      - name: Upload ABI artifact
        uses: actions/upload-artifact@v4
        with:
          name: motor_abi-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error
