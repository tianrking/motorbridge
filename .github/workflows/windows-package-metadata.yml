name: Generate Windows Package Metadata

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v0.1.4)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Windows CLI release zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          mkdir -p dist
          gh release download "${TAG}" --pattern "motor-cli-${TAG}-windows-x86_64.zip" --dir dist
          ls -lah dist

      - name: Generate winget/scoop/choco metadata
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          python3 tools/release/gen_windows_manifests.py \
            --tag "${TAG}" \
            --repo "${{ github.repository }}" \
            --zip "dist/motor-cli-${TAG}-windows-x86_64.zip" \
            --out "packaging/windows"

      - name: Commit and push generated manifests
        run: |
          if git diff --quiet -- packaging/windows; then
            echo "No manifest changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/windows
          git commit -m "chore(windows): update winget/scoop/choco metadata for ${{ steps.meta.outputs.tag }}"
          git push
