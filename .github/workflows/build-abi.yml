name: ABI Release

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: abi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-abi:
    name: build-abi-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: ubuntu-latest
            platform: linux-aarch64
          - os: windows-latest
            platform: windows-x86_64
          - os: macos-13
            platform: macos-x86_64
          - os: macos-14
            platform: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux aarch64 cross linker
        if: matrix.platform == 'linux-aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Add Linux aarch64 Rust target
        if: matrix.platform == 'linux-aarch64'
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Build ABI (Linux x86_64)
        if: matrix.platform == 'linux-x86_64'
        run: cargo build -p motor_abi --release

      - name: Build ABI (Linux aarch64)
        if: matrix.platform == 'linux-aarch64'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build -p motor_abi --release --target aarch64-unknown-linux-gnu

      - name: Build ABI (Windows/macOS)
        if: startsWith(matrix.platform, 'windows') || startsWith(matrix.platform, 'macos')
        run: cargo build -p motor_abi --release

      - name: Prepare package (Linux x86_64)
        if: matrix.platform == 'linux-x86_64'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGE="dist/motorbridge-abi-${VERSION}-linux-x86_64"
          mkdir -p "${STAGE}"
          cp -v motor_abi/include/motor_abi.h "${STAGE}/"
          cp -v target/release/libmotor_abi.so "${STAGE}/"
          cp -v target/release/libmotor_abi.a "${STAGE}/"
          tar -czf "dist/motorbridge-abi-${VERSION}-linux-x86_64.tar.gz" -C dist "$(basename "${STAGE}")"

      - name: Prepare package (Linux aarch64)
        if: matrix.platform == 'linux-aarch64'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGE="dist/motorbridge-abi-${VERSION}-linux-aarch64"
          mkdir -p "${STAGE}"
          cp -v motor_abi/include/motor_abi.h "${STAGE}/"
          cp -v target/aarch64-unknown-linux-gnu/release/libmotor_abi.so "${STAGE}/"
          cp -v target/aarch64-unknown-linux-gnu/release/libmotor_abi.a "${STAGE}/"
          tar -czf "dist/motorbridge-abi-${VERSION}-linux-aarch64.tar.gz" -C dist "$(basename "${STAGE}")"

      - name: Prepare package (Windows)
        if: matrix.platform == 'windows-x86_64'
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $stage = "dist/motorbridge-abi-$version-windows-x86_64"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item motor_abi/include/motor_abi.h "$stage/" -Force
          Copy-Item target/release/motor_abi.dll "$stage/" -Force
          if (Test-Path target/release/motor_abi.lib) {
            Copy-Item target/release/motor_abi.lib "$stage/" -Force
          }
          Compress-Archive -Path "$stage/*" -DestinationPath "dist/motorbridge-abi-$version-windows-x86_64.zip" -Force

      - name: Prepare package (macOS x86_64)
        if: matrix.platform == 'macos-x86_64'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGE="dist/motorbridge-abi-${VERSION}-macos-x86_64"
          mkdir -p "${STAGE}"
          cp -v motor_abi/include/motor_abi.h "${STAGE}/"
          cp -v target/release/libmotor_abi.dylib "${STAGE}/"
          cp -v target/release/libmotor_abi.a "${STAGE}/"
          tar -czf "dist/motorbridge-abi-${VERSION}-macos-x86_64.tar.gz" -C dist "$(basename "${STAGE}")"

      - name: Prepare package (macOS arm64)
        if: matrix.platform == 'macos-arm64'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGE="dist/motorbridge-abi-${VERSION}-macos-arm64"
          mkdir -p "${STAGE}"
          cp -v motor_abi/include/motor_abi.h "${STAGE}/"
          cp -v target/release/libmotor_abi.dylib "${STAGE}/"
          cp -v target/release/libmotor_abi.a "${STAGE}/"
          tar -czf "dist/motorbridge-abi-${VERSION}-macos-arm64.tar.gz" -C dist "$(basename "${STAGE}")"

      - name: Upload ABI package artifact
        uses: actions/upload-artifact@v4
        with:
          name: abi-package-${{ matrix.platform }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  build-python-wheel-linux:
    name: build-python-wheel-linux-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel==2.21.3

      - name: Build Python wheels (Linux)
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*musllinux* *i686* *pp*"
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          CIBW_BUILD_FRONTEND: pip
          CIBW_BEFORE_ALL_LINUX: >
            curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal &&
            . $HOME/.cargo/env &&
            cd /project &&
            cargo build -p motor_abi --release &&
            mkdir -p bindings/python/src/motorbridge/lib &&
            cp -v target/release/libmotor_abi.so bindings/python/src/motorbridge/lib/
        run: python -m cibuildwheel --platform linux bindings/python --output-dir bindings/python/dist

      - name: Upload Linux wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-linux-${{ matrix.arch }}
          path: bindings/python/dist/*.whl
          if-no-files-found: error

  build-python-wheel-windows:
    name: build-python-wheel-windows-py${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python build tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build ABI for wheel
        run: cargo build -p motor_abi --release

      - name: Inject shared library into Python package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path bindings/python/src/motorbridge/lib -Force | Out-Null
          Copy-Item target/release/motor_abi.dll bindings/python/src/motorbridge/lib/motor_abi.dll -Force

      - name: Build wheel
        shell: pwsh
        run: |
          if (Test-Path bindings/python/dist) { Remove-Item bindings/python/dist -Recurse -Force }
          if (Test-Path bindings/python/build) { Remove-Item bindings/python/build -Recurse -Force }
          if (Test-Path bindings/python/src/motorbridge.egg-info) { Remove-Item bindings/python/src/motorbridge.egg-info -Recurse -Force }
          python -m pip wheel --no-build-isolation bindings/python -w bindings/python/dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-windows-py${{ matrix.python-version }}
          path: bindings/python/dist/*.whl
          if-no-files-found: error

  build-python-wheel-macos:
    name: build-python-wheel-${{ matrix.os-label }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            os-label: macos-x86_64
            python-version: "3.10"
          - os: macos-13
            os-label: macos-x86_64
            python-version: "3.11"
          - os: macos-13
            os-label: macos-x86_64
            python-version: "3.12"
          - os: macos-14
            os-label: macos-arm64
            python-version: "3.10"
          - os: macos-14
            os-label: macos-arm64
            python-version: "3.11"
          - os: macos-14
            os-label: macos-arm64
            python-version: "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python build tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build ABI for wheel
        run: cargo build -p motor_abi --release

      - name: Inject shared library into Python package
        shell: bash
        run: |
          mkdir -p bindings/python/src/motorbridge/lib
          cp -v target/release/libmotor_abi.dylib bindings/python/src/motorbridge/lib/

      - name: Build wheel
        shell: bash
        run: |
          rm -rf bindings/python/dist bindings/python/build bindings/python/src/motorbridge.egg-info
          python -m pip wheel --no-build-isolation bindings/python -w bindings/python/dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.os-label }}-py${{ matrix.python-version }}
          path: bindings/python/dist/*.whl
          if-no-files-found: error

  build-python-sdist:
    name: build-python-sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: python -m pip install --upgrade pip build setuptools wheel

      - name: Build source distribution
        shell: bash
        run: |
          rm -rf bindings/python/dist
          python -m build --sdist bindings/python -o bindings/python/dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: bindings/python/dist/*.tar.gz
          if-no-files-found: error

  release:
    name: publish-release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-abi
      - build-python-wheel-linux
      - build-python-wheel-windows
      - build-python-wheel-macos
      - build-python-sdist
    runs-on: ubuntu-latest
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          find release-assets -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.whl" \) -print0 | sort -z | xargs -0 sha256sum > release-assets/SHA256SUMS.txt
          cat release-assets/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.zip
            release-assets/**/*.whl
            release-assets/SHA256SUMS.txt
