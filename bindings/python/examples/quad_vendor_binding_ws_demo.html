<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Binding WS 4-Motor Control</title>
  <style>
    :root {
      --bg: #090f1c;
      --card: #0f1930;
      --line: #2a3b63;
      --text: #e8efff;
      --muted: #9cb0d9;
      --accent: #45c7ff;
      --accent2: #7ae0b6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 18px;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(900px 500px at -10% -20%, #1a2f56 0%, transparent 65%),
        radial-gradient(900px 500px at 110% 120%, #10384d 0%, transparent 60%),
        var(--bg);
    }
    .shell { max-width: 1480px; margin: 0 auto; }
    .layout {
      display: grid;
      grid-template-columns: minmax(720px, 1fr) 360px;
      gap: 12px;
      align-items: start;
    }
    .main-col { min-width: 0; }
    .side-col { min-width: 0; }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      background: linear-gradient(180deg, #101c36 0%, #0e1730 100%);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
    }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    label { color: var(--muted); font-size: 13px; }
    input, button {
      background: #0b1222;
      color: var(--text);
      border: 1px solid #344a7a;
      border-radius: 10px;
      padding: 7px 9px;
      transition: border-color 120ms ease, transform 120ms ease, box-shadow 120ms ease;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(69, 199, 255, 0.18); }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    button {
      cursor: pointer;
      background: linear-gradient(180deg, #16335f 0%, #122c52 100%);
      border-color: #2f5a95;
    }
    button:hover { transform: translateY(-1px); border-color: #4b77b6; }
    .title { margin: 0 0 8px 0; font-size: 18px; }
    .muted { color: var(--muted); font-size: 12px; }
    .badge {
      display: inline-block;
      border: 1px solid #37527f;
      color: #b9d0ff;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      margin-left: 6px;
    }
    .log-card {
      position: sticky;
      top: 10px;
      max-height: calc(100vh - 24px);
      display: flex;
      flex-direction: column;
    }
    .log-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    #log {
      min-height: 280px;
      max-height: calc(100vh - 120px);
      overflow: auto;
      scroll-behavior: smooth;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      background: #09101f;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .log-item {
      border: 1px solid #243a60;
      background: #0c1528;
      border-radius: 8px;
      padding: 6px 8px;
      line-height: 1.4;
      word-break: break-word;
    }
    .log-ts { color: #9ac6ff; margin-right: 6px; }
    @media (max-width: 1180px) {
      .layout { grid-template-columns: 1fr; }
      .log-card { position: static; max-height: none; }
      #log { max-height: 280px; }
    }
  </style>
</head>
<body>
  <div class="shell">
  <div class="layout">
  <div class="main-col">
  <div class="card">
    <h3 class="title">Binding WS 4-Motor Control <span class="badge">Real-time Mode</span></h3>
    <div class="row">
      <label>WS</label><input id="wsUrl" value="ws://127.0.0.1:9010" size="30" />
      <button id="btnConn">Connect</button>
      <button id="btnEnable">Enable Sending</button>
      <button id="btnDisable">Pause Sending</button>
      <button id="btnState">Get State</button>
      <label><input id="autoStateOn" type="checkbox" checked /> Auto State Refresh</label>
      <label>State Poll (ms)</label><input id="stateMs" value="50" size="5" />
      <label><input id="rtOn" type="checkbox" checked /> Real-time Send on Drag</label>
      <label>Throttle (ms)</label><input id="rtMs" value="40" size="5" />
      <label>My Display Scale</label><input id="myScale" value="100.000" size="7" />
      <label><input id="unifyOn" type="checkbox" /> Unified Slider Mode</label>
      <label><input id="verboseLog" type="checkbox" /> Verbose WS Log</label>
    </div>
    <div class="row" style="margin-top:8px;">
      <label>Unified Pos</label>
      <input id="allPos" value="0.000" size="8" />
      <button id="btnSendAll">Send to All</button>
    </div>
    <div style="margin-top:8px;">
      <input id="allSlider" type="range" min="-3.14" max="3.14" step="0.01" value="0" />
    </div>
    <div class="muted" style="margin-top:8px;">When dragging sliders, targets are sent at the throttle interval to reduce bus burst congestion.</div>
  </div>
  <div class="card">
    <div class="grid" id="cards"></div>
  </div>
  <div class="card">
    <div class="row" style="justify-content:space-between;">
      <strong>Live Position Curves</strong>
    </div>
    <canvas id="posChart" height="210" style="width:100%; margin-top:8px; border:1px solid var(--line); border-radius:10px; background:#09101f;"></canvas>
  </div>
  </div>
  <div class="side-col">
  <div class="card log-card">
    <div class="log-head">
      <strong>Event Log</strong>
      <button id="btnClearLog">Clear</button>
    </div>
    <div id="log"></div>
  </div>
  </div>
  </div>
  </div>

  <script>
    const motors = ["dm1", "dm2", "my", "rs"];
    const model = {
      dm1: { pos: 0 }, dm2: { pos: 0 }, my: { pos: 0 }, rs: { pos: 0 }
    };
    const cfgState = {
      dm1: { dir_sign: 1.0 },
      dm2: { dir_sign: 1.0 },
      my: { dir_sign: 1.0 },
      rs: { dir_sign: -1.0 },
    };
    const feedback = { dm1: {}, dm2: {}, my: {}, rs: {} };
    const colors = { dm1: "#45c7ff", dm2: "#7ae0b6", my: "#ffd166", rs: "#ff7b72" };
    const posHistory = { dm1: [], dm2: [], my: [], rs: [] };
    const MAX_POINTS = 260;
    const lastSentAt = { dm1: 0, dm2: 0, my: 0, rs: 0 };
    let ws = null;
    let stateTimer = null;

    const $ = (id) => document.getElementById(id);
    function log(msg) {
      const t = new Date().toLocaleTimeString();
      const div = document.createElement("div");
      div.className = "log-item";
      div.innerHTML = `<span class="log-ts">[${t}]</span><span>${String(msg)}</span>`;
      $("log").appendChild(div);
      $("log").scrollTop = $("log").scrollHeight;
    }
    function send(obj) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify(obj));
    }
    function startStatePolling() {
      stopStatePolling();
      if (!$("autoStateOn").checked) return;
      const ms = Math.max(20, Number($("stateMs").value) || 50);
      stateTimer = setInterval(() => send({ op: "get_state" }), ms);
    }
    function stopStatePolling() {
      if (stateTimer) {
        clearInterval(stateTimer);
        stateTimer = null;
      }
    }
    function fmt(v, n=3) {
      if (v === undefined || v === null || Number.isNaN(Number(v))) return "-";
      return Number(v).toFixed(n);
    }
    function myScale() {
      const s = Number($("myScale")?.value ?? 1.0);
      return Number.isFinite(s) && Math.abs(s) > 1e-9 ? s : 1.0;
    }
    function toDisplayPos(m, rawPos) {
      if (!Number.isFinite(rawPos)) return rawPos;
      if (m === "my") return rawPos * myScale();
      if (m === "rs") {
        const sign = Number(cfgState[m]?.dir_sign ?? 1.0);
        return rawPos * sign;
      }
      return rawPos;
    }
    function toCommandPos(m, displayPos) {
      if (!Number.isFinite(displayPos)) return displayPos;
      // Command path stays unchanged for MyActuator.
      // Only telemetry/curve display uses My Display Scale.
      if (m === "my") return displayPos;
      return displayPos;
    }
    function updateFeedbackUi() {
      motors.forEach((m) => {
        const e = $(`fb-${m}`);
        if (!e) return;
        const f = feedback[m] || {};
        const rawPos = Number(f.pos);
        const dispPos = Number.isFinite(rawPos) ? toDisplayPos(m, rawPos) : undefined;
        e.textContent =
          `status=${f.status_code ?? "-"} can=${f.can_id ?? "-"} arb=${f.arbitration_id ?? "-"}  ` +
          `pos=${fmt(dispPos)} vel=${fmt(f.vel)} torq=${fmt(f.torq)}  ` +
          `t_mos=${fmt(f.t_mos, 1)} t_rotor=${fmt(f.t_rotor, 1)}`;
      });
    }
    function pushHistoryFromFeedback() {
      motors.forEach((m) => {
        let p = Number(feedback[m]?.pos);
        if (Number.isFinite(p)) p = toDisplayPos(m, p);
        if (!Number.isFinite(p)) return;
        const arr = posHistory[m];
        arr.push(p);
        if (arr.length > MAX_POINTS) arr.splice(0, arr.length - MAX_POINTS);
      });
    }
    function drawChart() {
      const c = $("posChart");
      if (!c) return;
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(320, c.clientWidth || 320);
      const h = c.clientHeight || 220;
      c.width = Math.floor(w * dpr);
      c.height = Math.floor(h * dpr);
      const ctx = c.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, w, h);

      const pad = { l: 44, r: 14, t: 10, b: 24 };
      const cw = w - pad.l - pad.r;
      const ch = h - pad.t - pad.b;
      if (cw <= 10 || ch <= 10) return;

      const all = motors.flatMap((m) => posHistory[m]);
      let minY = -3.2, maxY = 3.2;
      if (all.length > 0) {
        const lo = Math.min(...all), hi = Math.max(...all);
        const span = Math.max(0.2, hi - lo);
        minY = lo - span * 0.12;
        maxY = hi + span * 0.12;
      }
      const yOf = (v) => pad.t + (maxY - v) * ch / (maxY - minY || 1);
      const xOf = (i, n) => pad.l + (n <= 1 ? 0 : (i / (n - 1)) * cw);

      ctx.strokeStyle = "#23385d";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = pad.t + (i / 4) * ch;
        ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + cw, y); ctx.stroke();
      }
      ctx.fillStyle = "#9cb0d9";
      ctx.font = "12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      ctx.fillText(maxY.toFixed(2), 4, pad.t + 4);
      ctx.fillText(((maxY + minY) / 2).toFixed(2), 4, pad.t + ch / 2 + 4);
      ctx.fillText(minY.toFixed(2), 4, pad.t + ch + 4);

      motors.forEach((m) => {
        const arr = posHistory[m];
        if (arr.length < 2) return;
        ctx.strokeStyle = colors[m];
        ctx.lineWidth = 2;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.beginPath();
        arr.forEach((v, i) => {
          const x = xOf(i, arr.length);
          const y = yOf(v);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
      });

      // In-chart legend (top-right)
      const legendItems = [
        ["dm1", colors.dm1],
        ["dm2", colors.dm2],
        ["my(display scaled)", colors.my],
        ["rs(norm)", colors.rs],
      ];
      const lx = pad.l + cw - 190;
      const ly = pad.t + 8;
      const lh = 18;
      const lw = 178;
      const bh = legendItems.length * lh + 10;
      ctx.fillStyle = "rgba(10,18,34,0.78)";
      ctx.strokeStyle = "#2b426c";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(lx - 8, ly - 8, lw, bh, 8);
      ctx.fill();
      ctx.stroke();
      ctx.font = "12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      legendItems.forEach((it, i) => {
        const y = ly + i * lh;
        ctx.strokeStyle = it[1];
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(lx, y);
        ctx.lineTo(lx + 18, y);
        ctx.stroke();
        ctx.fillStyle = "#d7e6ff";
        ctx.fillText(it[0], lx + 24, y + 4);
      });
    }
    function sendTarget(m, pos, force=false) {
      const now = Date.now();
      const ms = Math.max(0, Number($("rtMs").value) || 0);
      if (!force && now - (lastSentAt[m] || 0) < ms) return;
      lastSentAt[m] = now;
      send({ op: "set_target", motor: m, pos: toCommandPos(m, pos) });
    }
    function sendAllTargets(pos, force=false) {
      motors.forEach((m) => sendTarget(m, pos, force));
    }
    function render() {
      const root = $("cards");
      const unified = $("unifyOn").checked;
      root.innerHTML = "";
      motors.forEach((m) => {
        const c = document.createElement("div");
        c.className = "card";
        c.innerHTML = `
          <div class="row"><strong>${m}</strong><span class="badge">target</span></div>
          <div class="row">
            <label>pos</label>
            <input id="pos-${m}" value="${Number(model[m].pos).toFixed(3)}" size="8" ${unified ? "disabled" : ""} />
            <button id="send-${m}" ${unified ? "disabled" : ""}>Send</button>
          </div>
          <div><input id="slider-${m}" type="range" min="-3.14" max="3.14" step="0.01" value="${model[m].pos}" ${unified ? "disabled" : ""} /></div>
          <div id="fb-${m}" class="muted" style="margin-top:8px;">status=- can=- arb=- pos=- vel=- torq=- t_mos=- t_rotor=-</div>
        `;
        root.appendChild(c);
      });
      motors.forEach((m) => {
        const pe = $(`pos-${m}`);
        const se = $(`slider-${m}`);
        $(`send-${m}`).onclick = () => {
          const pos = Number(pe.value);
          model[m].pos = pos;
          se.value = String(pos);
          sendTarget(m, pos, true);
        };
        pe.onchange = () => {
          const pos = Number(pe.value);
          model[m].pos = pos;
          se.value = String(pos);
          sendTarget(m, pos, true);
        };
        se.oninput = () => {
          const pos = Number(se.value);
          model[m].pos = pos;
          pe.value = pos.toFixed(3);
          if ($("rtOn").checked) sendTarget(m, pos, false);
        };
      });
      updateFeedbackUi();
    }

    $("btnConn").onclick = () => {
      const url = $("wsUrl").value.trim();
      ws = new WebSocket(url);
      ws.onopen = () => {
        log("connected");
        send({ op: "get_state" });
        startStatePolling();
      };
      ws.onclose = () => {
        log("closed");
        stopStatePolling();
      };
      ws.onerror = () => log("socket error");
      ws.onmessage = (ev) => {
        if ($("verboseLog").checked) log(`rx ${ev.data}`);
        try {
          const msg = JSON.parse(ev.data);
          if (msg.state && msg.state.motors) {
            Object.keys(msg.state.motors).forEach((k) => {
              if (model[k]) {
                const raw = Number(msg.state.motors[k].pos ?? model[k].pos);
                // Keep control target in raw command unit (no My scaling).
                model[k].pos = Number.isFinite(raw) ? raw : model[k].pos;
              }
              if (cfgState[k]) cfgState[k] = { ...cfgState[k], ...msg.state.motors[k] };
            });
            if (msg.state.feedback) {
              Object.keys(msg.state.feedback).forEach((k) => {
                if (feedback[k] !== undefined) feedback[k] = msg.state.feedback[k] || {};
              });
            }
            render();
            updateFeedbackUi();
            pushHistoryFromFeedback();
            drawChart();
          } else if (msg.ok === false) {
            log(`error: ${msg.error || "unknown"}`);
          }
        } catch (_) {}
      };
    };
    $("btnEnable").onclick = () => send({ op: "set_enabled", enabled: true });
    $("btnDisable").onclick = () => send({ op: "set_enabled", enabled: false });
    $("btnState").onclick = () => send({ op: "get_state" });
    $("autoStateOn").onchange = () => {
      startStatePolling();
      log($("autoStateOn").checked ? "Auto state refresh: ON" : "Auto state refresh: OFF");
    };
    $("stateMs").onchange = () => {
      startStatePolling();
      log(`State poll interval set to ${Math.max(20, Number($("stateMs").value) || 50)} ms`);
    };
    $("myScale").onchange = () => {
      const s = myScale();
      $("myScale").value = s.toFixed(3);
      log(`MyActuator display scale set to ${s.toFixed(3)} (display = raw * scale, command unchanged)`);
      render();
      drawChart();
    };
    $("btnClearLog").onclick = () => { $("log").innerHTML = ""; };
    $("unifyOn").onchange = () => {
      render();
      log($("unifyOn").checked ? "Unified slider mode: ON" : "Unified slider mode: OFF");
    };
    $("btnSendAll").onclick = () => {
      const pos = Number($("allPos").value);
      if (!Number.isFinite(pos)) return;
      motors.forEach((m) => { model[m].pos = pos; });
      $("allSlider").value = String(pos);
      render();
      sendAllTargets(pos, true);
    };
    $("allPos").onchange = () => {
      const pos = Number($("allPos").value);
      if (!Number.isFinite(pos)) return;
      $("allSlider").value = String(pos);
      if ($("unifyOn").checked && $("rtOn").checked) {
        motors.forEach((m) => { model[m].pos = pos; });
        render();
        sendAllTargets(pos, true);
      }
    };
    $("allSlider").oninput = () => {
      const pos = Number($("allSlider").value);
      $("allPos").value = pos.toFixed(3);
      if (!$("unifyOn").checked) return;
      motors.forEach((m) => { model[m].pos = pos; });
      render();
      if ($("rtOn").checked) sendAllTargets(pos, false);
    };

    render();
    drawChart();
    window.addEventListener("resize", drawChart);
  </script>
</body>
</html>
